# RFS Framework LLM 통합 설정 파일
# 
# 이 파일은 LLM 통합 모듈의 기본 설정을 정의합니다.
# 환경변수나 별도의 설정 파일로 오버라이드할 수 있습니다.

llm:
  # 기본 설정
  default_provider: "openai"
  default_timeout: 30  # 초
  max_retries: 3
  retry_delay: 1.0  # 초
  
  # LLM 제공자 설정
  providers:
    openai:
      # API 키 (환경변수 OPENAI_API_KEY로 설정 권장)
      api_key: "${OPENAI_API_KEY}"
      base_url: "https://api.openai.com/v1"
      organization: null
      timeout: 30
      max_retries: 3
      
      # 모델별 기본 설정
      models:
        gpt-4:
          max_tokens: 2048
          temperature: 0.7
          top_p: 1.0
          frequency_penalty: 0.0
          presence_penalty: 0.0
          
        gpt-4-turbo:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          
        gpt-3.5-turbo:
          max_tokens: 2048
          temperature: 0.7
          top_p: 1.0
          
        # 임베딩 모델
        text-embedding-ada-002:
          dimensions: 1536
    
    anthropic:
      # API 키 (환경변수 ANTHROPIC_API_KEY로 설정 권장)
      api_key: "${ANTHROPIC_API_KEY}"
      base_url: "https://api.anthropic.com"
      timeout: 30
      max_retries: 3
      
      # 모델별 기본 설정
      models:
        claude-3-opus-20240229:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          
        claude-3-sonnet-20240229:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
          
        claude-3-haiku-20240307:
          max_tokens: 4096
          temperature: 0.7
          top_p: 1.0
  
  # 프롬프트 템플릿 설정
  templates:
    # 템플릿 디렉토리
    template_dir: "templates/llm"
    
    # 기본 템플릿 활성화
    enable_common_templates: true
    
    # 템플릿 캐싱
    cache_templates: true
    template_cache_size: 100
    
    # 자동 로딩
    auto_load: true
    
    # 커스텀 템플릿
    custom_templates:
      # 기술 문서 작성 템플릿
      tech_documentation:
        template: |
          당신은 기술 문서 작성 전문가입니다.
          
          주제: {{ topic }}
          대상 독자: {{ audience }}
          문서 유형: {{ doc_type }}
          
          다음 조건에 맞는 기술 문서를 작성해주세요:
          - 명확하고 구조화된 내용
          - 실용적인 예시 포함
          - 적절한 마크다운 포맷 사용
          
          {% if requirements %}
          특별 요구사항: {{ requirements }}
          {% endif %}
        
        variables:
          - topic
          - audience  
          - doc_type
          - requirements
      
      # API 문서 생성 템플릿
      api_documentation:
        template: |
          API 엔드포인트에 대한 문서를 생성해주세요.
          
          엔드포인트: {{ endpoint }}
          HTTP 메서드: {{ method }}
          설명: {{ description }}
          
          {% if parameters %}
          매개변수:
          {% for param in parameters %}
          - {{ param.name }} ({{ param.type }}): {{ param.description }}
          {% endfor %}
          {% endif %}
          
          {% if example_request %}
          요청 예시:
          ```json
          {{ example_request }}
          ```
          {% endif %}
          
          OpenAPI 3.0 스펙에 맞는 문서를 작성해주세요.
        
        variables:
          - endpoint
          - method
          - description
          - parameters
          - example_request
  
  # RAG (Retrieval Augmented Generation) 설정
  rag:
    # 기본 벡터 스토어
    default_vector_store: "chroma"
    
    # ChromaDB 설정
    chroma:
      persist_directory: "data/chroma"
      collection_name: "rfs_knowledge_base" 
      distance_function: "cosine"
      
      # 임베딩 설정
      embedding:
        provider: "openai"
        model: "text-embedding-ada-002"
        batch_size: 100
    
    # 문서 청킹 설정
    chunking:
      chunk_size: 1000
      chunk_overlap: 200
      separators: ["\n\n", "\n", " ", ""]
    
    # 검색 설정
    search:
      top_k: 5
      similarity_threshold: 0.7
      max_context_length: 4000
    
    # 답변 생성 설정
    generation:
      default_template: "detailed"
      max_answer_length: 2000
      include_sources: true
      source_limit: 3
  
  # 체인 워크플로우 설정
  chains:
    # 기본 설정
    default_timeout: 60  # 초
    max_parallel_chains: 5
    
    # 에러 처리
    error_handling:
      max_retries: 2
      retry_delay: 1.0
      fail_fast: true
    
    # 실행 추적
    execution_tracking:
      enabled: true
      max_history: 1000
      include_inputs: true
      include_outputs: true
  
  # 모니터링 설정
  monitoring:
    # 메트릭 수집
    metrics:
      enabled: true
      max_history: 10000
      cleanup_interval: 3600  # 초 (1시간)
      cleanup_older_than: 604800  # 초 (7일)
    
    # 토큰 모니터링
    token_monitor:
      enabled: true
      
      # 비용 한도 (USD)
      daily_limit: 10.0
      monthly_limit: 300.0
      
      # 알림 임계치 (비율)
      alert_thresholds:
        daily: 0.8    # 일일 한도의 80%
        monthly: 0.9  # 월간 한도의 90%
      
      # 모델별 가격 (1K 토큰당 USD)
      pricing:
        openai:
          gpt-4: 0.03
          gpt-4-turbo: 0.01
          gpt-3.5-turbo: 0.002
          text-embedding-ada-002: 0.0001
        
        anthropic:
          claude-3-opus-20240229: 0.015
          claude-3-sonnet-20240229: 0.003
          claude-3-haiku-20240307: 0.00025
    
    # 성능 추적
    performance:
      enabled: true
      track_response_time: true
      track_token_usage: true
      track_error_rate: true
      
      # 알림 임계치
      response_time_threshold: 5000  # ms
      error_rate_threshold: 0.1     # 10%
  
  # 캐싱 설정
  cache:
    # 기본 설정
    enabled: true
    backend: "memory"  # memory, redis (향후 지원)
    default_ttl: 3600  # 초 (1시간)
    compression: true
    
    # 메모리 캐시 설정
    memory:
      max_size: 1000
      cleanup_interval: 1800  # 초 (30분)
    
    # Redis 캐시 설정 (향후 구현)
    redis:
      host: "localhost"
      port: 6379
      db: 0
      password: null
      key_prefix: "rfs:llm:cache:"
    
    # 캐시 정책
    policies:
      # 제공자별 캐시 설정
      openai:
        ttl: 3600
        enabled: true
      
      anthropic:
        ttl: 3600
        enabled: true
      
      # 모델별 캐시 설정
      models:
        gpt-4:
          ttl: 7200  # 2시간 (비싼 모델은 더 오래)
        gpt-3.5-turbo:
          ttl: 3600  # 1시간
        claude-3-opus-20240229:
          ttl: 7200  # 2시간
  
  # 보안 설정
  security:
    # API 키 보안
    api_keys:
      # 환경변수에서만 로드
      from_env_only: true
      # 로그에 키 노출 방지
      mask_in_logs: true
    
    # 콘텐츠 필터링
    content_filtering:
      enabled: false  # 기본적으로 비활성화 (제공자의 필터링에 의존)
      max_prompt_length: 50000
      blocked_patterns: []
    
    # 속도 제한
    rate_limiting:
      enabled: false  # 기본적으로 비활성화 (제공자의 제한에 의존)
      requests_per_minute: 60
      requests_per_hour: 1000
  
  # 개발 설정
  development:
    # 디버그 모드
    debug: false
    
    # 상세 로깅
    verbose_logging: false
    
    # 테스트 모드
    test_mode: false
    mock_responses: false
    
    # 로컬 개발
    local:
      # 오프라인 모드 (캐시만 사용)
      offline_mode: false
      # 모조 응답 사용
      use_mock_responses: false
      
  # 프로덕션 설정
  production:
    # 성능 최적화
    performance:
      # 연결 풀링
      connection_pooling: true
      max_connections: 100
      
      # 배치 처리
      enable_batching: true
      batch_size: 10
      batch_timeout: 1.0  # 초
    
    # 안정성
    reliability:
      # 서킷 브레이커
      circuit_breaker:
        enabled: true
        failure_threshold: 10
        timeout: 60  # 초
        
      # 헬스 체크
      health_check:
        enabled: true
        interval: 300  # 초 (5분)
        timeout: 10   # 초
    
    # 모니터링 강화
    monitoring:
      # 메트릭 내보내기
      export_metrics: true
      metrics_endpoint: "/metrics"
      
      # 알림
      alerts:
        enabled: true
        webhook_url: null
        email_notifications: false