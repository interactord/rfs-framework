# RFS Framework mypy 설정 파일
# Phase 3: 점진적 강화 모드 (2024-08-27)
# 목표: 핵심 타입 검사 활성화 및 오류 감소

[mypy]
python_version = 3.11

# Phase 7: 완화된 타입 검사
ignore_errors = False
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False

# 기본 설정
namespace_packages = True
explicit_package_bases = True
show_error_codes = True
show_error_context = True

# 통계 출력
show_column_numbers = True
pretty = True

# 캐시 설정
cache_dir = .mypy_cache
incremental = True

# Phase 15: 강화된 기본 경고 활성화
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
no_implicit_optional = True

# Phase 16: 고급 타입 안전성 기능
strict_optional = True
warn_unreachable = True
disallow_any_generics = False
disallow_any_unimported = True
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False
disallow_subclassing_any = True
disallow_untyped_calls = False
disallow_incomplete_defs = False
disallow_untyped_decorators = False
strict_equality = True
extra_checks = True

# 테스트 코드 및 mock 관련 모두 제외
[mypy-tests.*]
ignore_errors = True

[mypy-tests]
ignore_errors = True

[mypy-conftest]
ignore_errors = True

[mypy-rfs.testing.*]
ignore_errors = True

[mypy-*.mocks.*]
ignore_errors = True

[mypy-*.fixtures.*]
ignore_errors = True

# 서드파티 라이브러리 (항상 제외)
[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-rich.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-tortoise.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-aioredis.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

# Phase 14: 강화된 핵심 모듈 검사 (완성된 모듈들에 엄격 설정 적용)
[mypy-rfs.core.result]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True
no_implicit_optional = True

[mypy-rfs.core.config]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True
no_implicit_optional = True

[mypy-rfs.hof.core]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True
no_implicit_optional = True

# Phase 14: 완성된 확장 모듈들 엄격 설정
[mypy-rfs.database.repository]
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-rfs.messaging.base]
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-rfs.reactive.flux]
disallow_untyped_defs = True
check_untyped_defs = True