# RFS Framework mypy 설정 파일
# Phase 1: 최대 완화 모드 (2024-08-27)
# 목표: CI 통합 및 베이스라인 설정

[mypy]
python_version = 3.11

# Phase 1: 오류 확인은 하되 CI는 통과 (베이스라인 설정)
ignore_errors = False  # 오류 확인 활성화
ignore_missing_imports = True

# 기본 설정
namespace_packages = True
explicit_package_bases = True
show_error_codes = True
show_error_context = True

# 통계 출력
show_column_numbers = True
pretty = True

# 캐시 설정
cache_dir = .mypy_cache
incremental = True

# Phase 1에서는 모든 경고 비활성화
warn_return_any = False
warn_unused_configs = False
warn_redundant_casts = False
warn_unused_ignores = False
warn_no_return = False

# 테스트 코드 및 mock 관련 모두 제외
[mypy-tests.*]
ignore_errors = True

[mypy-tests]
ignore_errors = True

[mypy-test_*]
ignore_errors = True

[mypy-conftest]
ignore_errors = True

[mypy-*_test]
ignore_errors = True

[mypy-*.tests.*]
ignore_errors = True

[mypy-*.test_*]
ignore_errors = True

[mypy-rfs.testing.*]
ignore_errors = True

[mypy-*.mocks.*]
ignore_errors = True

[mypy-*.fixtures.*]
ignore_errors = True

# 서드파티 라이브러리 (항상 제외)
[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-rich.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-tortoise.*]
ignore_missing_imports = True