codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: 70%
        threshold: 10%
        if_not_found: success

ignore:
  - "tests/"
  - "examples/"
  - "docs/"
  - "*.md"
  - "setup.py"
  - "conftest.py"

comment:
  layout: "reach, diff, flags, files, footer"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes

flags:
  unittests:
    paths:
      - src/
    carryforward: true